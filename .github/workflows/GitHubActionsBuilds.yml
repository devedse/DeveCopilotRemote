name: GitHubActionsBuilds

on: push

jobs:
  generate_version_number:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.buildnumber.outputs.build_number }}
    steps:
      - name: Generate build number
        id: buildnumber
        uses: onyxmueller/build-tag-number@v1
        with:
          token: ${{secrets.github_token}}

  build_and_package:
    needs: generate_version_number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Compile TypeScript
        run: npm run compile
      - name: Set version
        run: |
          VERSION=1.0.${{needs.generate_version_number.outputs.build_number}}
          npm version $VERSION --no-git-tag-version
      - name: Package VSIX
        run: npx @vscode/vsce package --allow-missing-repository --skip-license --out deve-copilot-remote.vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeveCopilotRemote.vsix
          path: deve-copilot-remote.vsix

  release_github:
    permissions:
      contents: write
    needs: [generate_version_number, build_and_package]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: DeveCopilotRemote.vsix
          path: ./artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 1.0.${{needs.generate_version_number.outputs.build_number}}
          name: 1.0.${{needs.generate_version_number.outputs.build_number}}
          body: |
            ${{ github.event.head_commit.message }}

            ## Install
            Download the `.vsix` file and install it in VS Code:
            ```
            code --install-extension deve-copilot-remote.vsix
            ```
          files: ./artifacts/deve-copilot-remote.vsix
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
